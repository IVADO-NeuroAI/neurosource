name: Validate Catalog Entries

on:
  pull_request:
    paths:
      - 'models/**/*.yaml'
      - 'datasets/**/*.yaml'
      - 'repositories/**/*.yaml'
      - 'schema/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install jsonschema pyyaml
      - name: Validate all entries
        run: python .github/scripts/validate_entries.py
